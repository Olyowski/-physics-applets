<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle-Wave Duality Practice</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1923;
      --panel: #1a2736;
      --panel-light: #223344;
      --accent: #00e5ff;
      --accent-dim: #00a0b2;
      --success: #00e676;
      --warning: #ffab00;
      --danger: #ff5252;
      --text: #e0e8f0;
      --text-dim: #7a8fa0;
      --border: #2a3a4a;
      --glow: rgba(0, 229, 255, 0.15);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    body::before {
      content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 30%, rgba(0,229,255,0.03) 0%, transparent 50%),
                  radial-gradient(circle at 80% 70%, rgba(0,230,118,0.03) 0%, transparent 50%);
      pointer-events: none; z-index: 0;
    }
    .app { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; padding: 30px 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; position: relative; overflow: hidden; }
    .header::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--success), var(--accent)); }
    .header h1 { font-size: 2em; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header p { color: var(--text-dim); font-size: 0.95em; }
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; text-align: center; }
    .stat-card .label { font-size: 0.7em; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 4px; }
    .stat-card .value { font-family: 'JetBrains Mono', monospace; font-size: 1.6em; font-weight: 700; color: var(--accent); }
    .stat-card.level .value { font-size: 1em; padding: 4px 12px; border-radius: 20px; display: inline-block; }
    .stat-card.level .value.easy { background: rgba(0,230,118,0.15); color: var(--success); }
    .stat-card.level .value.medium { background: rgba(255,171,0,0.15); color: var(--warning); }
    .stat-card.level .value.hard { background: rgba(255,82,82,0.15); color: var(--danger); }
    .progress-container { margin-bottom: 24px; }
    .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85em; color: var(--text-dim); }
    .progress-track { height: 8px; background: var(--panel-light); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 4px; transition: width 0.5s ease; }
    .question-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 30px; margin-bottom: 20px; }
    .question-card .q-number { font-family: 'JetBrains Mono', monospace; font-size: 0.75em; color: var(--accent-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }
    .question-card .q-text { font-size: 1.1em; line-height: 1.7; margin-bottom: 20px; }
    .question-card .q-text strong { color: var(--accent); font-weight: 600; }
    .diagram-box { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: center; }
    .diagram-box img { max-width: 100%; height: auto; border-radius: 6px; }
    .diagram-box .diagram-caption { font-size: 0.8em; color: var(--text-dim); margin-top: 8px; font-style: italic; }
    .input-group { margin-bottom: 12px; }
    .input-group label { display: block; font-size: 0.85em; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; }
    .input-row { display: flex; gap: 10px; align-items: center; }
    .input-row input { flex: 1; background: var(--bg); border: 2px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 1em; outline: none; transition: border-color 0.3s; }
    .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
    .input-row .unit { font-family: 'JetBrains Mono', monospace; color: var(--text-dim); font-size: 0.9em; min-width: 30px; }
    .mc-options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
    .mc-btn { background: var(--bg); border: 2px solid var(--border); border-radius: 10px; padding: 14px 18px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 1em; text-align: left; cursor: pointer; transition: all 0.2s; }
    .mc-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--panel-light); }
    .mc-btn.selected { border-color: var(--accent); background: rgba(0,229,255,0.08); }
    .mc-btn.correct-ans { border-color: var(--success); background: rgba(0,230,118,0.12); color: var(--success); }
    .mc-btn.wrong-ans { border-color: var(--danger); background: rgba(255,82,82,0.1); color: var(--danger); }
    .mc-btn:disabled { cursor: not-allowed; }
    .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent), var(--success)); border: none; border-radius: 12px; color: var(--bg); font-family: 'Outfit', sans-serif; font-size: 1em; font-weight: 700; cursor: pointer; transition: all 0.3s; margin-top: 20px; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px var(--glow); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .next-btn { display: none; width: 100%; padding: 14px; margin-top: 16px; background: var(--panel-light); border: 2px solid var(--border); border-radius: 12px; color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 0.95em; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .next-btn:hover { background: var(--panel); border-color: var(--accent); }
    .feedback { margin-top: 16px; padding: 16px; border-radius: 12px; font-size: 0.95em; line-height: 1.6; display: none; }
    .feedback.correct { display: block; background: rgba(0,230,118,0.1); border: 1px solid var(--success); color: var(--success); }
    .feedback.incorrect { display: block; background: rgba(255,82,82,0.1); border: 1px solid var(--danger); color: var(--danger); }
    .feedback.sigfig { display: block; background: rgba(255,171,0,0.1); border: 1px solid var(--warning); color: var(--warning); }
    .feedback .work { margin-top: 12px; padding: 12px; background: var(--bg); border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 0.9em; white-space: pre-line; color: var(--text-dim); }
    .mastery-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15,25,35,0.95); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
    .mastery-overlay.show { display: flex; }
    .mastery-card { background: var(--panel); border: 2px solid var(--accent); border-radius: 20px; padding: 50px 40px; text-align: center; max-width: 500px; box-shadow: 0 20px 60px rgba(0,229,255,0.3); }
    .mastery-card .trophy { font-size: 5em; margin-bottom: 20px; animation: bounce 1s ease; }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    .mastery-card h2 { font-size: 2.5em; margin-bottom: 16px; background: linear-gradient(135deg, var(--accent), var(--success)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .mastery-card p { color: var(--text-dim); margin-bottom: 24px; line-height: 1.8; }
    .mastery-card .timestamp { font-size: 0.85em; color: var(--text-dim); margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    @media (max-width: 600px) { .stats-bar { grid-template-columns: repeat(2,1fr); } .header h1 { font-size: 1.5em; } }
  </style>
</head>

    function diag(which, caption) {
      var src = which === 'panels' ? IMG_PANELS : IMG_DIAGRAM;
      return '<div class="diagram-box"><img src="data:image/png;base64,' + src + '" alt="' + caption + '"><div class="diagram-caption">' + caption + '</div></div>';
    }

    // ====== STATE ======
    var correct = 0, total = 0, streak = 0, bestStreak = 0;
    var level = 0, consecutiveCorrect = 0, consecutiveWrong = 0;
    var currentProblem = null, answered = false, selectedMC = null;
    var MASTERY_TARGET = 15;

    // ====== UTILITIES ======
    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function randDec(min, max, dec) { return parseFloat((Math.random() * (max - min) + min).toFixed(dec)); }

    function roundToSigFigs(num, sf) {
      if (num === 0) return 0;
      var mag = Math.floor(Math.log10(Math.abs(num)));
      var scale = Math.pow(10, sf - 1 - mag);
      return Math.round(num * scale) / scale;
    }

    function countSigFigs(str) {
      str = str.replace(/^-/, '').trim();
      if (str.includes('e') || str.includes('E')) str = str.split(/[eE]/)[0];
      if (str.includes('.')) {
        // Remove leading zeros and the decimal point, then strip any remaining leading zeros
        // e.g. "0.0064" -> strip leading 0s -> ".0064" -> remove dot -> "0064" -> strip leading 0s -> "64" -> length 2
        str = str.replace(/^0+/, '').replace('.', '').replace(/^0+/, '');
        return str.length;
      }
      // No decimal: trailing zeros are not significant
      str = str.replace(/^0+/, '').replace(/0+$/, '');
      return str.length;
    }

    function sfFromNum(num) {
      var str = num.toString();
      if (Number.isInteger(num) && num >= 10) return countSigFigs(str);
      if (Math.abs(num) < 1 && Math.abs(num) > 0) return countSigFigs(str.replace(/^0\.0*/, ''));
      return countSigFigs(str);
    }

    function minSF() {
      var min = Infinity;
      for (var i = 0; i < arguments.length; i++) { var s = sfFromNum(arguments[i]); if (s < min) min = s; }
      return min;
    }

    function checkAnswer(studentStr, correctVal, requiredSF) {
      var n = parseFloat(studentStr);
      if (isNaN(n)) return 'wrong';
      if (Math.abs(n - correctVal) > Math.abs(correctVal * 0.05)) return 'wrong';
      if (countSigFigs(studentStr) < requiredSF) return 'sigfig';
      return 'correct';
    }

    var easyProblems = [

        return {
          html: 'A laser with wavelength <strong>' + lnm + ' nm</strong> shines through two slits <strong>' + d_mm + ' mm</strong> apart. The screen is <strong>' + L + ' m</strong> away. Calculate the distance from the central maximum to the <strong>m\u00a0=\u00a0' + m + '</strong> bright fringe.',
          diagram: diag('diagram', 'Double-slit geometry \u2014 identify x, L, d, and \u03b8'),
          inputs: [{label: 'Distance to fringe (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'x = m\u03bbL / d\nx = ' + m + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3)\nx = ' + x + ' m',
          feedback: 'Use x\u00a0=\u00a0m\u03bbL/d. Convert nm\u2192m (\u00d710\u207b\u2079) and mm\u2192m (\u00d710\u207b\u00b3).'
        };
      },
      function() {
        var lnm = rand(420,680), d_mm = randDec(0.15,0.45,2), L = randDec(1.5,4.0,1), m = rand(2,6);
        var d = d_mm*1e-3, lam = lnm*1e-9;
        var sf = minSF(d_mm, L, lnm);
        var x = roundToSigFigs(m*lam*L/d, sf);
        return {
          html: 'Light with wavelength <strong>' + lnm + ' nm</strong> passes through a double slit (separation <strong>' + d_mm + ' mm</strong>). The screen is <strong>' + L + ' m</strong> away. What is the distance from the center to the <strong>' + m + 'th order</strong> bright fringe?',
          diagram: diag('diagram', 'Use the diagram to set up your variables before calculating'),
          inputs: [{label: 'Fringe distance (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'x = m\u03bbL / d\nx = ' + m + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3)\nx = ' + x + ' m',
          feedback: 'x = m\u03bbL/d. All distances must be in meters.'
        };
      },
      function() {
        var lnm = rand(450,650), d_mm = randDec(0.20,0.40,2), L = randDec(1.0,2.5,1), m = rand(1,4);
        var d = d_mm*1e-3, lam = lnm*1e-9;
        var sf = minSF(d_mm, L, lnm);
        var x = roundToSigFigs(m*lam*L/d, sf);
        return {
          html: 'In a double-slit experiment, slit separation is <strong>' + d_mm + ' mm</strong> and the screen is <strong>' + L + ' m</strong> away. The light source has wavelength <strong>' + lnm + ' nm</strong>. Find the screen distance for the <strong>m\u00a0=\u00a0' + m + '</strong> maximum.',
          diagram: null,
          inputs: [{label: 'Screen distance (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'x = m\u03bbL / d\nx = ' + m + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3)\nx = ' + x + ' m',
          feedback: 'x = m\u03bbL/d. Convert nm to m (\u00d710\u207b\u2079) and mm to m (\u00d710\u207b\u00b3).'
        };
      }
    ];

    // ====== MEDIUM: Find m_max within angle, then find x ======
    var mediumProblems = [
      function() {
        var lnm = rand(400,700), d_mm = randDec(0.20,0.50,2), L = randDec(1.5,3.5,1), th = randDec(1.0,8.0,1);
        var d = d_mm*1e-3, lam = lnm*1e-9, thr = th*Math.PI/180;
        var mmax = Math.floor(d*Math.sin(thr)/lam);
        var sf = minSF(d_mm, L, lnm);
        var x = roundToSigFigs(mmax*lam*L/d, sf);
        return {
          html: 'A laser (\u03bb\u00a0=\u00a0<strong>' + lnm + ' nm</strong>) passes through slits <strong>' + d_mm + ' mm</strong> apart, <strong>' + L + ' m</strong> from a screen. For \u03b8\u00a0=\u00a0<strong>' + th + '\u00b0</strong>, find the distance from the central maximum to the <strong>farthest bright fringe</strong> within that angle.',
          diagram: diag('diagram', 'Use the diagram to identify \u03b8, L, d, and x'),
          inputs: [{label: 'Distance to farthest fringe (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'Step 1: m_max = floor(d\u00b7sin(\u03b8) / \u03bb)\n= floor(' + d_mm + '\u00d710\u207b\u00b3 \u00d7 sin(' + th + '\u00b0) / ' + lnm + '\u00d710\u207b\u2079)\n= ' + mmax + '\n\nStep 2: x = m\u03bbL/d\n= ' + mmax + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3)\n= ' + x + ' m',
          feedback: 'First d\u00b7sin(\u03b8)=m\u03bb gives m_max (round DOWN), then x = m\u03bbL/d.'
        };
      },
      function() {
        var lnm = rand(420,680), d_mm = randDec(0.25,0.45,2), L = randDec(1.0,3.0,1), th = randDec(2.0,7.0,1);
        var d = d_mm*1e-3, lam = lnm*1e-9, thr = th*Math.PI/180;
        var mmax = Math.floor(d*Math.sin(thr)/lam);
        var sf = minSF(d_mm, L, lnm);
        var x = roundToSigFigs(mmax*lam*L/d, sf);
        return {
          html: 'Light of wavelength <strong>' + lnm + ' nm</strong> passes through a double slit (separation <strong>' + d_mm + ' mm</strong>) onto a screen <strong>' + L + ' m</strong> away. The angle to the edge of the pattern is <strong>' + th + '\u00b0</strong>. Calculate the distance to the farthest maximum within this angle.',
          diagram: diag('diagram', 'Use the diagram to identify \u03b8, L, d, and x'),
          inputs: [{label: 'Distance to farthest maximum (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'm_max = floor(d\u00b7sin(\u03b8)/\u03bb) = ' + mmax + '\nx = ' + mmax + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3) = ' + x + ' m',
          feedback: 'd\u00b7sin(\u03b8) = m\u03bb gives m_max. Round DOWN (floor), then x = m\u03bbL/d.'
        };
      },
      function() {
        var lnm = rand(440,660), d_mm = randDec(0.20,0.40,2), L = randDec(2.0,4.0,1), th = randDec(1.5,6.0,1);
        var d = d_mm*1e-3, lam = lnm*1e-9, thr = th*Math.PI/180;
        var mmax = Math.floor(d*Math.sin(thr)/lam);
        var sf = minSF(d_mm, L, lnm);
        var x = roundToSigFigs(mmax*lam*L/d, sf);
        return {
          html: 'In a double-slit experiment with \u03bb\u00a0=\u00a0<strong>' + lnm + ' nm</strong>, d\u00a0=\u00a0<strong>' + d_mm + ' mm</strong>, and L\u00a0=\u00a0<strong>' + L + ' m</strong>, what is the position of the farthest bright fringe within \u03b8\u00a0=\u00a0<strong>' + th + '\u00b0</strong> of the central maximum?',
          diagram: null,
          inputs: [{label: 'Position of farthest fringe (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'm_max = floor(d\u00b7sin(' + th + '\u00b0)/\u03bb) = ' + mmax + '\nx = ' + mmax + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3) = ' + x + ' m',
          feedback: 'Use d\u00b7sin(\u03b8)=m\u03bb to find m_max (floor), then x = m\u03bbL/d.'
        };
      }
    ];

    // ====== HARD: Solve for lambda, identify color, or full multi-step ======
    var hardProblems = [
      function() {
        var lnm = rand(400,700), d_mm = randDec(0.15,0.45,2), L = randDec(1.5,3.5,1), m = rand(2,8);
        var d = d_mm*1e-3, lam = lnm*1e-9;
        var sf = minSF(d_mm, L);
        var x = roundToSigFigs(m*lam*L/d, sf);
        var lnm_calc = roundToSigFigs((x*d/(m*L))*1e9, sf);
        var ranges = [[380,450,'a. violet (380\u2013450 nm)'],[450,495,'b. blue (450\u2013495 nm)'],[495,570,'c. green (495\u2013570 nm)'],[570,590,'d. yellow (570\u2013590 nm)'],[590,620,'e. orange (590\u2013620 nm)'],[620,750,'f. red (620\u2013750 nm)']];
        var cidx = 0;
        for (var i = 0; i < ranges.length; i++) { if (lnm >= ranges[i][0] && lnm <= ranges[i][1]) { cidx = i; break; } }
        return {
          html: 'The <strong>m\u00a0=\u00a0' + m + '</strong> bright fringe is <strong>' + x + ' m</strong> from the central maximum. Slit separation is <strong>' + d_mm + ' mm</strong> and the screen is <strong>' + L + ' m</strong> away. What <strong>color</strong> is the light?',
          diagram: diag('diagram', 'Use \u03bb = xd/(mL) to find the wavelength, then identify the color'),
          inputs: [],
          mc: {options: ranges.map(function(r){return r[2];}), correct: cidx},
          work: '\u03bb = x\u00b7d / (m\u00b7L)\n= ' + x + ' \u00d7 ' + d_mm + '\u00d710\u207b\u00b3 / (' + m + ' \u00d7 ' + L + ')\n= ' + lnm_calc + ' nm\n\n' + ranges[cidx][2],
          feedback: 'Rearrange x = m\u03bbL/d \u2192 \u03bb = xd/(mL). Match the wavelength to the visible spectrum.'
        };
      },
      function() {
        var lnm = rand(420,680), d_mm = randDec(0.20,0.40,2), L = randDec(2.0,4.0,1), m = rand(3,10);
        var d = d_mm*1e-3, lam = lnm*1e-9;
        var sf = minSF(d_mm, L);
        var x = roundToSigFigs(m*lam*L/d, sf);
        var lnm_ans = roundToSigFigs((x*d/(m*L))*1e9, sf);
        return {
          html: 'In a double-slit experiment, the ' + m + 'th bright fringe is <strong>' + x + ' m</strong> from the center. The screen is <strong>' + L + ' m</strong> from slits that are <strong>' + d_mm + ' mm</strong> apart. Calculate the <strong>wavelength</strong> of the light in nanometers.',
          diagram: diag('diagram', 'Use \u03bb = xd/(mL) to find the wavelength, then identify the color'),
          inputs: [{label: 'Wavelength (\u03bb)', unit: 'nm', key: 'lambda'}],
          answers: {lambda: {value: lnm_ans, sf: sf}},
          work: '\u03bb = x\u00b7d / (m\u00b7L)\n= ' + x + ' \u00d7 ' + d_mm + '\u00d710\u207b\u00b3 / (' + m + ' \u00d7 ' + L + ')\n= ' + lnm_ans + ' nm',
          feedback: 'Rearrange x = m\u03bbL/d \u2192 \u03bb = xd/(mL). Multiply by 10\u2079 to convert m to nm.'
        };
      },
      function() {
        var lnm = rand(400,700), d_mm = randDec(0.20,0.50,2), L = randDec(1.0,3.5,1), th = randDec(1.0,5.0,1);
        var d = d_mm*1e-3, lam = lnm*1e-9, thr = th*Math.PI/180;
        var mmax = Math.floor(d*Math.sin(thr)/lam);
        var sf = minSF(d_mm, L, lnm);
        var x = roundToSigFigs(mmax*lam*L/d, sf);
        return {
          html: 'A laser (\u03bb\u00a0=\u00a0<strong>' + lnm + ' nm</strong>) shines through slits <strong>' + d_mm + ' mm</strong> apart onto a screen <strong>' + L + ' m</strong> away. For \u03b8\u00a0=\u00a0<strong>' + th + '\u00b0</strong>, what is the distance from the central maximum to the farthest bright fringe within that angle? Show all steps.',
          diagram: diag('diagram', 'Set up the triangle using \u03b8, L, and x to find the screen position'),
          inputs: [{label: 'Farthest fringe position (x)', unit: 'm', key: 'x'}],
          answers: {x: {value: x, sf: sf}},
          work: 'Step 1: m_max = floor(d\u00b7sin(\u03b8)/\u03bb)\n= floor(' + d_mm + '\u00d710\u207b\u00b3 \u00d7 sin(' + th + '\u00b0) / (' + lnm + '\u00d710\u207b\u2079))\n= ' + mmax + '\n\nStep 2: x = m\u03bbL/d\n= ' + mmax + ' \u00d7 ' + lnm + '\u00d710\u207b\u2079 \u00d7 ' + L + ' / (' + d_mm + '\u00d710\u207b\u00b3)\n= ' + x + ' m',
          feedback: 'Two steps: (1) m_max from d\u00b7sin(\u03b8)=m\u03bb, round DOWN; (2) x = m\u03bbL/d.'
        };
      }
    ];

    // ====== ENGINE ======
    function generateProblem() {
      var pools = [easyProblems, mediumProblems, hardProblems];
      currentProblem = pools[level][Math.floor(Math.random() * pools[level].length)]();
      answered = false;
      selectedMC = null;
      renderProblem();
    }

    function renderProblem() {
      var area = document.getElementById('questionArea');
      var levelNames = ['Easy', 'Medium', 'Hard'];
      var p = currentProblem;
      var html = '<div class="question-card">';
      html += '<div class="q-number">Problem ' + (total + 1) + ' &bull; ' + levelNames[level] + ' Level</div>';
      html += '<div class="q-text">' + p.html + '</div>';
      if (p.diagram) html += p.diagram;
      if (p.mc) {
        html += '<div class="mc-options">';
        p.mc.options.forEach(function(opt, idx) {
          html += '<button class="mc-btn" id="mc_' + idx + '" onclick="selectMC(' + idx + ')">' + opt + '</button>';
        });
        html += '</div>';
      } else {
        p.inputs.forEach(function(inp) {
          html += '<div class="input-group"><label>' + inp.label + '</label>';
          html += '<div class="input-row"><input type="text" id="input_' + inp.key + '" placeholder="Enter value..." onkeydown="if(event.key===\'Enter\') submitAnswer()">';
          html += '<span class="unit">' + inp.unit + '</span></div></div>';
        });
      }
      html += '<button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Check Answer</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '<button class="next-btn" id="nextBtn" onclick="generateProblem()">Next Problem &rarr;</button>';
      html += '</div>';
      area.innerHTML = html;
      setTimeout(function() { var f = area.querySelector('input[type="text"]'); if (f) f.focus(); }, 100);
    }

    function selectMC(idx) {
      if (answered) return;
      selectedMC = idx;
      document.querySelectorAll('.mc-btn').forEach(function(btn, i) {
        btn.classList.toggle('selected', i === idx);
      });
    }

    function submitAnswer() {
      if (answered) return;
      var p = currentProblem;
      var fb = document.getElementById('feedback');
      var allCorrect = true, hasSigFig = false;

      if (p.mc) {
        if (selectedMC === null) {
          fb.className = 'feedback incorrect'; fb.innerHTML = '&#x26A0;&#xFE0F; Please select an answer.'; fb.style.display = 'block'; return;
        }
        allCorrect = (selectedMC === p.mc.correct);
        document.querySelectorAll('.mc-btn').forEach(function(btn, i) {
          btn.disabled = true;
          if (i === p.mc.correct) btn.classList.add('correct-ans');
          else if (i === selectedMC) btn.classList.add('wrong-ans');
        });
      } else {
        for (var i = 0; i < p.inputs.length; i++) {
          var inp = p.inputs[i];
          var el = document.getElementById('input_' + inp.key);
          var val = el.value.trim();
          if (!val) { fb.className = 'feedback incorrect'; fb.innerHTML = '&#x26A0;&#xFE0F; Please enter a value.'; fb.style.display = 'block'; return; }
          var res = checkAnswer(val, p.answers[inp.key].value, p.answers[inp.key].sf);
          if (res === 'wrong') allCorrect = false;
          else if (res === 'sigfig') { hasSigFig = true; allCorrect = false; }
        }
      }

      answered = true; selectedMC = null; total++;
      document.getElementById('submitBtn').disabled = true;
      var html = '';

      if (allCorrect) {
        correct++; streak++; if (streak > bestStreak) bestStreak = streak;
        consecutiveCorrect++; consecutiveWrong = 0;
        html = '&#x2705; Correct! ' + p.feedback;
        if (p.work) html += '<div class="work">' + p.work + '</div>';
        fb.className = 'feedback correct';
        if (consecutiveCorrect >= 2 && level < 2) {
          level++; consecutiveCorrect = 0;
          html += '<br><br>&#x2B06;&#xFE0F; <strong>Level Up!</strong> Moving to ' + ['Easy','Medium','Hard'][level] + ' level.';
        }
      } else if (hasSigFig) {
        streak = 0; consecutiveCorrect = 0; consecutiveWrong++;
        html = '&#x26A0;&#xFE0F; Close! Check your <strong>significant figures</strong> \u2014 match the sig figs of the given values.';
        if (p.work) html += '<div class="work">' + p.work + '</div>';
        fb.className = 'feedback sigfig';
      } else {
        streak = 0; consecutiveCorrect = 0; consecutiveWrong++;
        html = '&#x274C; Not quite. ' + p.feedback;
        if (p.work) html += '<div class="work">' + p.work + '</div>';
        fb.className = 'feedback incorrect';
        if (consecutiveWrong >= 2 && level > 0) {
          level--; consecutiveWrong = 0;
          html += '<br><br>&#x2B07;&#xFE0F; Dropping to ' + ['Easy','Medium','Hard'][level] + ' level for more practice.';
        }
      }

      fb.innerHTML = html;
      document.getElementById('nextBtn').style.display = 'block';
      updateStats();
      if (correct >= MASTERY_TARGET) setTimeout(showMastery, 800);
    }

    function updateStats() {
      document.getElementById('correctCount').textContent = correct;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('streakCount').textContent = streak;
      var badge = document.getElementById('levelBadge');
      badge.textContent = ['Easy','Medium','Hard'][level];
      badge.className = 'value ' + ['easy','medium','hard'][level];
      document.getElementById('progressFill').style.width = Math.min((correct/MASTERY_TARGET)*100, 100) + '%';
      document.getElementById('progressText').textContent = correct + ' / ' + MASTERY_TARGET + ' correct needed';
    }

    function showMastery() {
      document.getElementById('masteryOverlay').classList.add('show');
      var pct = total > 0 ? Math.round((correct/total)*100) : 0;
      document.getElementById('masteryStats').innerHTML =
        '<strong>' + correct + '</strong> correct out of <strong>' + total + '</strong> total (' + pct + '%)<br>' +
        'Best Streak: <strong>' + bestStreak + '</strong><br>' +
        'Final Level: <strong>' + ['Easy','Medium','Hard'][level] + '</strong>';
      var now = new Date();
      document.getElementById('masteryTimestamp').textContent =
        now.toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'}) +
        ' at ' + now.toLocaleTimeString('en-US');
    }

    generateProblem();
  </script>
</body>
