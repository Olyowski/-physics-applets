<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Generation Problems</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1923;
      --panel: #1a2736;
      --panel-light: #223344;
      --accent: #00e5ff;
      --accent-dim: #00a0b2;
      --success: #00e676;
      --warning: #ffab00;
      --danger: #ff5252;
      --text: #e0e8f0;
      --text-dim: #7a8fa0;
      --border: #2a3a4a;
      --glow: rgba(0, 229, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background circuit pattern */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: 
        radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0, 230, 118, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 30px 20px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .header::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--success), var(--accent));
    }

    .header h1 {
      font-size: 2em;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header p {
      color: var(--text-dim);
      font-size: 0.95em;
    }

    /* Stats bar */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-card .label {
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .stat-card .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.6em;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card.level .value {
      font-size: 1em;
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
    }

    .stat-card.level .value.easy { background: rgba(0, 230, 118, 0.15); color: var(--success); }
    .stat-card.level .value.medium { background: rgba(255, 171, 0, 0.15); color: var(--warning); }
    .stat-card.level .value.hard { background: rgba(255, 82, 82, 0.15); color: var(--danger); }

    /* Progress bar */
    .progress-container {
      margin-bottom: 24px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.85em;
      color: var(--text-dim);
    }

    .progress-track {
      height: 8px;
      background: var(--panel-light);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* Question card */
    .question-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 20px;
      position: relative;
    }

    .question-card .q-number {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75em;
      color: var(--accent-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 14px;
    }

    .question-card .q-text {
      font-size: 1.1em;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .question-card .q-text strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Input area */
    .input-group {
      margin-bottom: 12px;
    }

    .input-group label {
      display: block;
      font-size: 0.85em;
      color: var(--text-dim);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-row input {
      flex: 1;
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 1em;
      outline: none;
      transition: border-color 0.3s;
    }

    .input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .input-row .unit {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-dim);
      font-size: 0.9em;
      min-width: 30px;
    }

    /* Buttons */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), var(--success));
      border: none;
      border-radius: 12px;
      color: var(--bg);
      font-family: 'Outfit', sans-serif;
      font-size: 1em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 20px;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px var(--glow);
    }

    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .next-btn {
      display: none;
      width: 100%;
      padding: 14px;
      margin-top: 16px;
      background: var(--panel-light);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .next-btn:hover {
      background: var(--panel);
      border-color: var(--accent);
    }

    /* Feedback */
    .feedback {
      margin-top: 16px;
      padding: 16px;
      border-radius: 12px;
      font-size: 0.95em;
      line-height: 1.6;
      display: none;
    }

    .feedback.correct {
      display: block;
      background: rgba(0, 230, 118, 0.1);
      border: 1px solid var(--success);
      color: var(--success);
    }

    .feedback.incorrect {
      display: block;
      background: rgba(255, 82, 82, 0.1);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    .feedback.sigfig {
      display: block;
      background: rgba(255, 171, 0, 0.1);
      border: 1px solid var(--warning);
      color: var(--warning);
    }

    .feedback .work {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9em;
      white-space: pre-line;
      color: var(--text-dim);
    }

    /* Mastery overlay */
    .mastery-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 25, 35, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .mastery-overlay.show {
      display: flex;
    }

    .mastery-card {
      background: var(--panel);
      border: 2px solid var(--accent);
      border-radius: 20px;
      padding: 50px 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 229, 255, 0.3);
    }

    .mastery-card .trophy {
      font-size: 5em;
      margin-bottom: 20px;
      animation: bounce 1s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .mastery-card h2 {
      font-size: 2.5em;
      margin-bottom: 16px;
      background: linear-gradient(135deg, var(--accent), var(--success));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .mastery-card p {
      color: var(--text-dim);
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .mastery-card .timestamp {
      font-size: 0.85em;
      color: var(--text-dim);
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .stats-bar {
        grid-template-columns: repeat(2, 1fr);
      }
      
      .header h1 {
        font-size: 1.5em;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>⚡ Power Generation Practice</h1>
      <p>Master Faraday's Law, EMF, and Motor Calculations</p>
    </div>

    <!-- Stats -->
    <div class="stats-bar">
      <div class="stat-card">
        <div class="label">Correct</div>
        <div class="value" id="correctCount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Total</div>
        <div class="value" id="totalCount">0</div>
      </div>
      <div class="stat-card">
        <div class="label">Streak</div>
        <div class="value" id="streakCount">0</div>
      </div>
      <div class="stat-card level">
        <div class="label">Level</div>
        <div class="value easy" id="levelBadge">Easy</div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-container">
      <div class="progress-header">
        <span id="progressText">0 / 15 correct needed</span>
        <span>🎯 Mastery Goal</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Question Area -->
    <div id="questionArea"></div>
  </div>

  <!-- Mastery Overlay -->
  <div class="mastery-overlay" id="masteryOverlay">
    <div class="mastery-card">
      <div class="trophy">🏆</div>
      <h2>Mastery Achieved!</h2>
      <p>You've mastered Power Generation calculations!</p>
      <div id="masteryStats"></div>
      <div class="timestamp" id="masteryTimestamp"></div>
    </div>
  </div>

  <script>
    // ====== STATE ======
    let correct = 0;
    let total = 0;
    let streak = 0;
    let bestStreak = 0;
    let level = 0; // 0=easy, 1=medium, 2=hard
    let consecutiveCorrect = 0;
    let consecutiveWrong = 0;
    let currentProblem = null;
    let answered = false;

    const MASTERY_TARGET = 15;

    // ====== UTILITIES ======
    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randDec(min, max, decimals) {
      const val = Math.random() * (max - min) + min;
      return parseFloat(val.toFixed(decimals));
    }

    function roundToSigFigs(num, sf) {
      if (num === 0) return 0;
      const magnitude = Math.floor(Math.log10(Math.abs(num)));
      const scale = Math.pow(10, sf - 1 - magnitude);
      return Math.round(num * scale) / scale;
    }

    function countSigFigs(str) {
      str = str.replace(/^-/, '').trim();
      if (str.includes('e') || str.includes('E')) {
        const parts = str.split(/[eE]/);
        str = parts[0];
      }
      str = str.replace(/^0+/, ''); // Remove leading zeros
      
      if (str.includes('.')) {
        // Has decimal point - trailing zeros ARE significant
        str = str.replace('.', '');
        // Don't strip trailing zeros when there was a decimal point
        return str.length;
      } else {
        // No decimal point - trailing zeros are NOT significant
        str = str.replace(/0+$/, '');
        return str.length;
      }
    }

    function getSigFigsFromNumber(num) {
      // Convert number to string in a way that preserves sig figs
      const str = num.toString();
      
      // Handle integers (whole numbers from rand())
      if (Number.isInteger(num) && num >= 10) {
        // Use countSigFigs which properly handles trailing zeros
        // 30, 40, 50 -> 1 sf (trailing zero doesn't count)
        // 32, 45, 57 -> 2 sf
        return countSigFigs(str);
      }
      
      // Handle numbers < 1 with leading zeros (e.g., 0.001, 0.08)
      if (Math.abs(num) < 1 && Math.abs(num) > 0) {
        // For numbers like 0.001, 0.002, etc (only one non-zero digit) -> 1 sf
        // For numbers like 0.08, 0.09 -> 1 sf
        // For numbers like 0.10, 0.12 -> 2 sf
        const cleaned = str.replace(/^0\.0*/, ''); // Remove "0.0*"
        return countSigFigs(cleaned);
      }
      
      // For other numbers, count normally
      return countSigFigs(str);
    }

    function getMinSigFigs(...values) {
      // Returns the minimum sig figs from a list of values
      let minSF = Infinity;
      for (const val of values) {
        const sf = getSigFigsFromNumber(val);
        if (sf < minSF) minSF = sf;
      }
      return minSF;
    }

    function checkAnswer(studentStr, correctVal, requiredSF) {
      const studentNum = parseFloat(studentStr);
      if (isNaN(studentNum)) return { status: 'wrong' };

      const tolerance = Math.abs(correctVal * 0.02);
      const diff = Math.abs(studentNum - correctVal);

      if (diff > tolerance) return { status: 'wrong' };

      const studentSF = countSigFigs(studentStr);
      if (Math.abs(studentSF - requiredSF) > 0) {
        return { status: 'sigfig', correctSF: requiredSF, studentSF };
      }

      return { status: 'correct' };
    }

    // ====== PROBLEM GENERATORS ======

    // EASY: Basic Faraday's Law (given N, A, B, Δt → find EMF)
    const easyProblems = [
      function() {
        const N = rand(50, 150);
        const A = randDec(0.001, 0.005, 3);
        const B = randDec(0.5, 1.5, 2);
        const dt = randDec(1.0, 5.0, 1);
        
        // Determine sig figs from the limiting value
        const sf = getMinSigFigs(A, B, dt / 1000);
        
        const EMF_raw = N * B * A / (dt / 1000);
        const EMF = roundToSigFigs(EMF_raw, sf);

        return {
          html: `A generator coil has <strong>${N} loops</strong> with an area of <strong>${A} m²</strong>. It rotates one-quarter turn in <strong>${dt} ms</strong>. The magnetic field strength is <strong>${B} T</strong>. Calculate the maximum EMF induced in the coil.`,
          inputs: [{ label: 'Maximum EMF', unit: 'V', key: 'EMF' }],
          answers: { EMF: { value: EMF, sf: sf } },
          work: `V_E = N × B × A / Δt\nV_E = ${N} × ${B} × ${A} / ${dt/1000}\nV_E = ${EMF} V`,
          feedback: `Faraday's law: the induced EMF equals the rate of change of magnetic flux through the coil.`
        };
      },
      function() {
        const N = rand(80, 200);
        const A = randDec(0.002, 0.008, 3);
        const B = randDec(0.6, 1.2, 2);
        const dt = randDec(2.0, 6.0, 1);
        
        // Determine sig figs from the limiting value
        const sf = getMinSigFigs(A, B, dt / 1000);
        
        const EMF_raw = N * B * A / (dt / 1000);
        const EMF = roundToSigFigs(EMF_raw, sf);

        return {
          html: `A wire coil in a generator has <strong>${N} square loops</strong>, each with area <strong>${A} m²</strong>. The coil rotates through one-quarter revolution in <strong>${dt} ms</strong> in a <strong>${B} T</strong> magnetic field. Find the maximum electromotive force.`,
          inputs: [{ label: 'Maximum EMF', unit: 'V', key: 'EMF' }],
          answers: { EMF: { value: EMF, sf: sf } },
          work: `V_E = N × B × A / Δt\nV_E = ${N} × ${B} × ${A} / ${dt/1000}\nV_E = ${EMF} V`,
          feedback: `The changing magnetic flux as the coil rotates induces the EMF.`
        };
      },
      function() {
        const N = rand(100, 180);
        const side = randDec(3.0, 6.0, 2);
        const A = (side / 100) * (side / 100);
        const B = randDec(0.7, 1.5, 2);
        const dt = randDec(1.5, 4.5, 1);
        
        // side has 2 sf (e.g., 5.2), so A also has 2 sf
        const sf = getMinSigFigs(side, B, dt / 1000);
        
        const EMF_raw = N * B * A / (dt / 1000);
        const EMF = roundToSigFigs(EMF_raw, sf);

        return {
          html: `A generator coil consists of <strong>${N} loops</strong>, each a square <strong>${side} cm</strong> on a side. The coil rotates one-quarter turn in <strong>${dt} ms</strong> in a uniform <strong>${B} T</strong> magnetic field. Calculate the maximum EMF induced.`,
          inputs: [{ label: 'Maximum EMF', unit: 'V', key: 'EMF' }],
          answers: { EMF: { value: EMF, sf: sf } },
          work: `Area = (${side} cm)² = ${A.toFixed(4)} m²\nV_E = N × B × A / Δt\nV_E = ${N} × ${B} × ${A.toFixed(4)} / ${dt/1000}\nV_E = ${EMF} V`,
          feedback: `Remember to convert the side length from cm to m before calculating area.`
        };
      }
    ];

    // MEDIUM: Motor power calculations using back EMF
    const mediumProblems = [
      function() {
        const R = randDec(0.10, 0.20, 2);
        const Vsupply = rand(50, 80);
        const Vback = rand(25, 45);
        
        // Determine sig figs from R (limiting factor)
        const sf = getMinSigFigs(R, Vsupply, Vback);
        
        const Istart = Vsupply / R;
        const Irun = (Vsupply - Vback) / R;
        const Pstart = Vsupply * Istart;
        const Prun = Vsupply * Irun;
        const Pdiff_raw = Pstart - Prun;
        const Pdiff_kW = roundToSigFigs(Pdiff_raw / 1000, sf);
        
        return {
          html: `A motor's coils have resistance <strong>${R} Ω</strong> and are driven by an EMF of <strong>${Vsupply} V</strong>. The back EMF induced when running is <strong>${Vback} V</strong>. Calculate the difference in power required at startup (no back EMF) versus at operating speed.`,
          inputs: [{ label: 'Power Difference', unit: 'kW', key: 'P' }],
          answers: { P: { value: Pdiff_kW, sf: sf } },
          work: `At startup: I_start = V/R = ${Vsupply}/${R} = ${roundToSigFigs(Istart, sf)} A\nP_start = V × I = ${Vsupply} × ${roundToSigFigs(Istart, sf)} = ${roundToSigFigs(Pstart, sf)} W\n\nAt speed: I_run = (V - V_back)/R = (${Vsupply} - ${Vback})/${R} = ${roundToSigFigs(Irun, sf)} A\nP_run = V × I = ${Vsupply} × ${roundToSigFigs(Irun, sf)} = ${roundToSigFigs(Prun, sf)} W\n\nΔP = ${roundToSigFigs(Pstart, sf)} - ${roundToSigFigs(Prun, sf)} = ${roundToSigFigs(Pdiff_raw, sf)} W = ${Pdiff_kW} kW`,
          feedback: `Motors draw much more current (and power) at startup because there's no back EMF to oppose the supply voltage.`
        };
      },
      function() {
        const R = randDec(0.12, 0.18, 2);
        const Vsupply = rand(55, 75);
        const Vback = rand(30, 50);
        
        // Determine sig figs from R (limiting factor)
        const sf = getMinSigFigs(R, Vsupply, Vback);
        
        const Istart = Vsupply / R;
        const Pstart = Vsupply * Istart;
        const Pdiff_kW = roundToSigFigs(Pstart / 1000, sf);

        return {
          html: `The coils in a motor have resistance <strong>${R} Ω</strong> and are driven by <strong>${Vsupply} V</strong>. At operating speed, the back EMF is <strong>${Vback} V</strong>. What is the startup power in kilowatts (when back EMF is zero)?`,
          inputs: [{ label: 'Startup Power', unit: 'kW', key: 'P' }],
          answers: { P: { value: Pdiff_kW, sf: sf } },
          work: `At startup (no back EMF):\nI = V/R = ${Vsupply}/${R} = ${roundToSigFigs(Istart, sf)} A\nP = V × I = ${Vsupply} × ${roundToSigFigs(Istart, sf)} = ${roundToSigFigs(Pstart, sf)} W\nP = ${Pdiff_kW} kW`,
          feedback: `The startup current is maximum because the back EMF hasn't developed yet to oppose the supply voltage.`
        };
      },
      function() {
        const R = randDec(0.08, 0.16, 2);
        const Vsupply = rand(45, 70);
        const Vback = rand(20, 40);
        
        // Determine sig figs from R (limiting factor)
        const sf = getMinSigFigs(R, Vsupply, Vback);
        
        const Irun = (Vsupply - Vback) / R;
        const Prun = Vsupply * Irun;
        const Prun_kW = roundToSigFigs(Prun / 1000, sf);
        
        return {
          html: `A DC motor operates with a coil resistance of <strong>${R} Ω</strong>. The supply voltage is <strong>${Vsupply} V</strong> and the back EMF at operating speed is <strong>${Vback} V</strong>. Calculate the power consumed at operating speed.`,
          inputs: [{ label: 'Operating Power', unit: 'kW', key: 'P' }],
          answers: { P: { value: Prun_kW, sf: sf } },
          work: `I = (V - V_back)/R = (${Vsupply} - ${Vback})/${R} = ${roundToSigFigs(Irun, sf)} A\nP = V × I = ${Vsupply} × ${roundToSigFigs(Irun, sf)} = ${roundToSigFigs(Prun, sf)} W = ${Prun_kW} kW`,
          feedback: `At operating speed, the back EMF reduces the net voltage across the coil, lowering current and power.`
        };
      }
    ];

    // HARD: Multi-step problems combining Faraday's law with other concepts
    const hardProblems = [
      function() {
        const N = rand(300, 400);
        const side = randDec(4.0, 5.5, 2);
        const A = (side / 100) * (side / 100);
        const B = randDec(0.9, 1.1, 2);
        const dt = randDec(10.0, 15.0, 1);
        
        // Determine sig figs
        const sf = getMinSigFigs(side, B, dt / 1000);
        
        const EMF_raw = N * B * A / (dt / 1000);
        const EMF = roundToSigFigs(EMF_raw, sf);

        return {
          html: `A generator coil is rotated one quarter of a full revolution in <strong>${dt} ms</strong>. The coil has <strong>${N} loops</strong>, and it is a square <strong>${side} cm</strong> on a side. The coil is in a uniform magnetic field of <strong>${B} T</strong>. What is the maximum electromotive force induced in the coil?`,
          inputs: [{ label: 'Maximum EMF', unit: 'V', key: 'EMF' }],
          answers: { EMF: { value: EMF, sf: sf } },
          work: `Area = (${side} cm)² = ${A.toFixed(6)} m²\nV_E = N × B × A / Δt\nV_E = ${N} × ${B} × ${A.toFixed(6)} / ${dt/1000}\nV_E = ${EMF} V`,
          feedback: `This problem requires careful unit conversion and attention to significant figures.`
        };
      },
      function() {
        const R = randDec(0.12, 0.16, 2);
        const Vsupply = rand(58, 68);
        const Vback = rand(32, 42);
        
        // Determine sig figs
        const sf = getMinSigFigs(R, Vsupply, Vback);
        
        const Istart = Vsupply / R;
        const Irun = (Vsupply - Vback) / R;
        const Pstart = Vsupply * Istart;
        const Prun = Vsupply * Irun;
        const Pdiff = Pstart - Prun;
        const Pdiff_kW = roundToSigFigs(Pdiff / 1000, sf);

        return {
          html: `The coils in a motor have a resistance of <strong>${R} Ω</strong> and are driven by an EMF of <strong>${Vsupply} V</strong>. The back EMF induced in the motor is <strong>${Vback} V</strong>. Calculate the difference in power required by the motor at start up and at operating speed.`,
          inputs: [{ label: 'Power Difference', unit: 'kW', key: 'P' }],
          answers: { P: { value: Pdiff_kW, sf: sf } },
          work: `At startup:\nI_start = V/R = ${Vsupply}/${R} = ${roundToSigFigs(Istart, 3)} A\nP_start = V × I = ${Vsupply} × ${roundToSigFigs(Istart, 3)} = ${roundToSigFigs(Pstart, 3)} W\n\nAt operating speed:\nI_run = (V - V_back)/R = (${Vsupply} - ${Vback})/${R} = ${roundToSigFigs(Irun, 3)} A\nP_run = V × I = ${Vsupply} × ${roundToSigFigs(Irun, 3)} = ${roundToSigFigs(Prun, 3)} W\n\nΔP = ${roundToSigFigs(Pstart, 3)} - ${roundToSigFigs(Prun, 3)} = ${roundToSigFigs(Pdiff, 3)} W = ${Pdiff_kW} kW`,
          feedback: `The motor requires significantly more power during startup when there's no back EMF to oppose the supply voltage.`
        };
      },
      function() {
        const N = rand(140, 180);
        const A = randDec(0.035, 0.050, 3);
        const B = randDec(0.80, 0.95, 2);
        const dt = randDec(1.5, 2.5, 1);
        
        // Determine sig figs
        const sf = getMinSigFigs(A, B, dt / 1000);
        
        const EMF_raw = N * B * A / (dt / 1000);
        const EMF = roundToSigFigs(EMF_raw, sf);

        return {
          html: `A wire coil inside a generator has <strong>${N} square loops</strong> and an area equal to <strong>${A} m²</strong>. The coil rotates one-quarter turn in <strong>${dt} ms</strong>. If a <strong>${B} T</strong> magnetic field surrounds the coil, what is the maximum electromotive force induced in the coil?`,
          inputs: [{ label: 'Maximum EMF', unit: 'V', key: 'EMF' }],
          answers: { EMF: { value: EMF, sf: sf } },
          work: `V_E = N × B × A / Δt\nV_E = ${N} × ${B} × ${A} / ${dt/1000}\nV_E = ${EMF} V`,
          feedback: `This high voltage demonstrates why generators are so effective at converting mechanical energy to electrical energy.`
        };
      }
    ];

    // ====== GENERATE PROBLEM ======
    function generateProblem() {
      const pools = [easyProblems, mediumProblems, hardProblems];
      const pool = pools[level];
      const generator = pool[Math.floor(Math.random() * pool.length)];
      currentProblem = generator();
      answered = false;
      selectedDirections = {};
      renderProblem();
    }

    function renderProblem() {
      const area = document.getElementById('questionArea');
      const levelNames = ['Easy', 'Medium', 'Hard'];
      const p = currentProblem;

      let html = `
        <div class="question-card">
          <div class="q-number">Problem ${total + 1} • ${levelNames[level]} Level</div>
          <div class="q-text">${p.html}</div>
      `;

      // Input fields
      p.inputs.forEach(inp => {
        html += `
          <div class="input-group">
            <label>${inp.label}</label>
            <div class="input-row">
              <input type="text" id="input_${inp.key}" placeholder="Enter value..." 
                     onkeydown="if(event.key==='Enter') submitAnswer()">
              <span class="unit">${inp.unit}</span>
            </div>
          </div>
        `;
      });

      html += `
          <button class="submit-btn" id="submitBtn" onclick="submitAnswer()">Check Answer</button>
          <div class="feedback" id="feedback"></div>
          <button class="next-btn" id="nextBtn" onclick="generateProblem()">Next Problem →</button>
        </div>
      `;

      area.innerHTML = html;
      // Focus first input
      setTimeout(() => {
        const firstInput = area.querySelector('input[type="text"]');
        if (firstInput) firstInput.focus();
      }, 100);
    }

    let selectedDirections = {};

    // ====== SUBMIT ANSWER ======
    function submitAnswer() {
      if (answered) return;
      const p = currentProblem;
      const fb = document.getElementById('feedback');
      let allCorrect = true;
      let hasSigFigIssue = false;

      // Check each input
      for (const inp of p.inputs) {
        const el = document.getElementById(`input_${inp.key}`);
        const studentVal = el.value.trim();
        if (!studentVal) {
          fb.className = 'feedback incorrect';
          fb.innerHTML = '⚠️ Please enter a value before submitting.';
          return;
        }

        const ans = p.answers[inp.key];
        const result = checkAnswer(studentVal, ans.value, ans.sf);

        if (result.status === 'wrong') {
          allCorrect = false;
        } else if (result.status === 'sigfig') {
          hasSigFigIssue = true;
          allCorrect = false;
        }
      }

      answered = true;
      total++;
      document.getElementById('submitBtn').disabled = true;

      let feedbackHTML = '';

      if (allCorrect && !hasSigFigIssue) {
        correct++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        consecutiveCorrect++;
        consecutiveWrong = 0;

        feedbackHTML = `✅ Correct! ${p.feedback}`;
        if (p.work) feedbackHTML += `<div class="work">${p.work}</div>`;
        fb.className = 'feedback correct';

        // Level up after 2 consecutive correct
        if (consecutiveCorrect >= 2 && level < 2) {
          level++;
          consecutiveCorrect = 0;
          feedbackHTML += `<br><br>⬆️ <strong>Level Up!</strong> Moving to ${['Easy', 'Medium', 'Hard'][level]} level.`;
        }
      } else if (hasSigFigIssue) {
        streak = 0;
        consecutiveCorrect = 0;
        consecutiveWrong++;

        feedbackHTML = `⚠️ Your numerical answer is close, but check your <strong>significant figures</strong>. Match the sig figs of the given values.`;
        if (p.work) feedbackHTML += `<div class="work">${p.work}</div>`;
        fb.className = 'feedback sigfig';
      } else {
        streak = 0;
        consecutiveCorrect = 0;
        consecutiveWrong++;

        feedbackHTML = `❌ Not quite. ${p.feedback}`;
        if (p.work) feedbackHTML += `<div class="work">${p.work}</div>`;
        fb.className = 'feedback incorrect';

        // Level down after 2 consecutive wrong
        if (consecutiveWrong >= 2 && level > 0) {
          level--;
          consecutiveWrong = 0;
          feedbackHTML += `<br><br>⬇️ Dropping to ${['Easy', 'Medium', 'Hard'][level]} level for more practice.`;
        }
      }

      fb.innerHTML = feedbackHTML;
      document.getElementById('nextBtn').style.display = 'block';
      updateStats();

      // Check mastery
      if (correct >= MASTERY_TARGET) {
        setTimeout(showMastery, 800);
      }
    }

    // ====== UPDATE UI ======
    function updateStats() {
      document.getElementById('correctCount').textContent = correct;
      document.getElementById('totalCount').textContent = total;
      document.getElementById('streakCount').textContent = streak;

      const badge = document.getElementById('levelBadge');
      const names = ['Easy', 'Medium', 'Hard'];
      const classes = ['easy', 'medium', 'hard'];
      badge.textContent = names[level];
      badge.className = 'value ' + classes[level];

      const pct = Math.min((correct / MASTERY_TARGET) * 100, 100);
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${correct} / ${MASTERY_TARGET} correct needed`;
    }

    function showMastery() {
      const overlay = document.getElementById('masteryOverlay');
      overlay.classList.add('show');

      const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
      document.getElementById('masteryStats').innerHTML = `
        <strong>${correct}</strong> correct out of <strong>${total}</strong> total (${pct}%)<br>
        Best Streak: <strong>${bestStreak}</strong><br>
        Final Level: <strong>${['Easy', 'Medium', 'Hard'][level]}</strong>
      `;

      const now = new Date();
      document.getElementById('masteryTimestamp').textContent =
        now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) +
        ' at ' + now.toLocaleTimeString('en-US');
    }

    // ====== INIT ======
    generateProblem();
  </script>
</body>
</html>
